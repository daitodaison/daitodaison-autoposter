name: AutoPoster
on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 3 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      publish_mode:
        description: '公開モード（draft=下書き, publish=即公開）※通常実行時のみ使用'
        required: false
        default: 'draft'
        type: choice
        options:
          - draft
          - publish
      run_mode:
        description: '実行モード'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - ameblo_image_test
          - note_body_test
          - linkedin_test
          - substack_test
      note_body_strategy:
        description: '【note_body_test時のみ有効】本文の変換ロジック（Markdown→HTML）を選択'
        required: false
        default: 'baseline'
        type: choice
        options:
          - baseline
          - baseline_escaped
          - bold_italic
      note_inject_strategy:
        description: '【note_body_test時のみ有効】本文をエディタに入れる方法を選択'
        required: false
        default: 'baseline'
        type: choice
        options:
          - baseline
          - clipboard_paste
          - line_by_line
permissions:
  contents: write
jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          pip install playwright requests groq
          playwright install chromium --with-deps

      # --- 通常モード時のみ実行されるステップ群 ---
      - name: Generate
        if: github.event.inputs.run_mode == 'normal' || github.event.inputs.run_mode == ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python generator/generate.py

      - name: Post note
        if: github.event.inputs.run_mode == 'normal' || github.event.inputs.run_mode == ''
        env:
          NOTE_USER: ${{ secrets.NOTE_USER }}
          NOTE_PASS: ${{ secrets.NOTE_PASS }}
          NOTE_COOKIES: ${{ secrets.NOTE_COOKIES }}
          PUBLISH_MODE: ${{ github.event.inputs.publish_mode || 'draft' }}
        run: python posters/note_poster.py

      - name: Post ameblo
        if: github.event.inputs.run_mode == 'normal' || github.event.inputs.run_mode == ''
        env:
          AMEBLO_USER: ${{ secrets.AMEBLO_USER }}
          AMEBLO_PASS: ${{ secrets.AMEBLO_PASS }}
          AMEBLO_COOKIES: ${{ secrets.AMEBLO_COOKIES }}
          PUBLISH_MODE: ${{ github.event.inputs.publish_mode || 'draft' }}
        run: python posters/ameblo_poster.py

      - name: Post linkedin
        if: github.event.inputs.run_mode == 'normal' || github.event.inputs.run_mode == ''
        env:
          LINKEDIN_COOKIES: ${{ secrets.LINKEDIN_COOKIES }}
          PUBLISH_MODE: ${{ github.event.inputs.publish_mode || 'draft' }}
        run: python posters/linkedin_poster.py

      - name: Post substack
        if: github.event.inputs.run_mode == 'normal' || github.event.inputs.run_mode == ''
        env:
          SUBSTACK_COOKIES: ${{ secrets.SUBSTACK_COOKIES }}
          PUBLISH_MODE: ${{ github.event.inputs.publish_mode || 'draft' }}
        run: python posters/substack_poster.py

      # --- テストモード: Ameblo画像アップロード単体 ---
      - name: Test ameblo image upload only
        if: github.event.inputs.run_mode == 'ameblo_image_test'
        env:
          AMEBLO_USER: ${{ secrets.AMEBLO_USER }}
          AMEBLO_PASS: ${{ secrets.AMEBLO_PASS }}
          AMEBLO_COOKIES: ${{ secrets.AMEBLO_COOKIES }}
          AMEBLO_TEST_IMAGE_ONLY: "true"
        run: python posters/ameblo_poster.py

      # --- テストモード: note本文単体 ---
      - name: Test note body only
        if: github.event.inputs.run_mode == 'note_body_test'
        env:
          NOTE_USER: ${{ secrets.NOTE_USER }}
          NOTE_PASS: ${{ secrets.NOTE_PASS }}
          NOTE_COOKIES: ${{ secrets.NOTE_COOKIES }}
          NOTE_BODY_ONLY_TEST: "true"
          NOTE_BODY_STRATEGY: ${{ github.event.inputs.note_body_strategy || 'baseline' }}
          NOTE_INJECT_STRATEGY: ${{ github.event.inputs.note_inject_strategy || 'baseline' }}
        run: python posters/note_poster.py

      # --- テストモード: LinkedIn画像＋本文テスト（投稿ボタンは押さない） ---
      - name: Test linkedin
        if: github.event.inputs.run_mode == 'linkedin_test'
        env:
          LINKEDIN_COOKIES: ${{ secrets.LINKEDIN_COOKIES }}
          LINKEDIN_TEST_MODE: "true"
        run: python posters/linkedin_poster.py

      # --- テストモード: Substack画像＋本文テスト（公開ボタンは押さない） ---
      - name: Test substack
        if: github.event.inputs.run_mode == 'substack_test'
        env:
          SUBSTACK_COOKIES: ${{ secrets.SUBSTACK_COOKIES }}
          SUBSTACK_TEST_MODE: "true"
        run: python posters/substack_poster.py

      - name: Upload debug screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshots
          path: |
            note_*.png
            ameblo_*.png
            linkedin_*.png
            substack_*.png
          if-no-files-found: ignore

      # --- Saveステップは通常モード時のみ ---
      - name: Save
        if: github.event.inputs.run_mode == 'normal' || github.event.inputs.run_mode == ''
        run: |
          git config user.name "AutoPoster"
          git config user.email "bot@github.com"
          for f in queue/*.json; do
            [ -f "$f" ] && mv "$f" posted/
          done
          git add -A
          git stash
          git pull --rebase origin main
          git stash pop
          git add -A
          git diff --staged --quiet || git commit -m "posted $(date '+%Y-%m-%d %H:%M')"
          git push
